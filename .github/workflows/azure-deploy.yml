name: Deploy to Azure Web App

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  AZURE_WEBAPP_NAME: 'dyna-firmadocumentos-api'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v4

    - name: 🐍 Configurar Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: 📦 Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🧪 Ejecutar tests (opcional)
      run: |
        if [ -f "pytest.ini" ] || [ -d "tests" ]; then
          pip install pytest
          pytest --tb=short || echo "⚠️ Tests fallaron, continuando despliegue..."
        else
          echo "✓ No hay tests configurados, saltando..."
        fi

    - name: 🚀 Desplegar a Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: .

    - name: ✅ Verificar despliegue
      run: |
        echo "🎉 Despliegue completado!"
        echo ""
        echo "📍 URLs importantes:"
        echo "   - Base:    https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
        echo "   - Health:  https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/health"
        echo "   - Docs:    https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/docs"
        echo "   - ReDoc:   https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/redoc"
        echo ""
        echo "⏳ La aplicación puede tardar 1-2 minutos en iniciar por primera vez"
